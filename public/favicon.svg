<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5b3e6"/>
      <stop offset="50%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#ffb5a7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#mg)"/>
  <text x="32" y="34" font-family="Fredoka, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle" dominant-baseline="central" fill="#ffffff" filter="url(#soft)">M&amp;G</text>
</svg>
