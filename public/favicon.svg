<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="50%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0814"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#mg)" opacity="0.95"/>
  <text x="32" y="34" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-style="italic" font-size="26" text-anchor="middle" dominant-baseline="central" fill="#ffffff" filter="url(#glow)">M&amp;G</text>
</svg>
