<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0814" />
    <title>M &amp; G — Meet &amp; Greet | Say Hi to Someone New</title>
    <meta name="description" content="M &amp; G is a playful 1-on-1 video and text chat to meet someone new. No sign up, no download. Free, 18+." />
    <meta name="keywords" content="m and g, meet and greet, random chat, video chat, 1-on-1 chat, meet new people, friendly chat, omegle alternative" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://randomchat.example/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="M &amp; G" />
    <meta property="og:title" content="M &amp; G — Meet &amp; Greet" />
    <meta property="og:description" content="Playful 1-on-1 video and text chat. Meet someone new in seconds. 18+." />
    <meta property="og:url" content="https://randomchat.example/" />
    <meta property="og:image" content="https://randomchat.example/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="M &amp; G — Meet &amp; Greet" />
    <meta name="twitter:description" content="Playful 1-on-1 video and text chat. Meet someone new in seconds. 18+." />
    <meta name="twitter:image" content="https://randomchat.example/og.png" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- TODO pre-launch: add /favicon.ico (32x32) and /apple-touch-icon.png (180x180) -->
    <!-- TODO pre-launch: add /og.png (1200x630) — referenced by og:image above -->
    <!-- TODO pre-launch: replace all randomchat.example with your real domain -->


    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "M & G",
      "url": "https://randomchat.example/",
      "description": "Playful 1-on-1 video and text chat. Meet new people in seconds.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript and WebRTC support",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "audience": { "@type": "Audience", "suggestedMinAge": 18 }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/age-gate.css" />
    <script src="/age-gate.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo"></span>
        <span class="name">M &amp; G</span>
      </div>
      <div class="stats">
        <span id="online">0</span> online
      </div>
    </header>

    <main id="app">
      <!-- LANDING -->
      <section id="landing" class="landing">
        <h1>Say hi to <span class="accent">someone new.</span></h1>
        <p class="sub">Meet &amp; Greet — one-on-one video or text. No sign up. Be kind, 18+ only.</p>

        <div class="gender-row">
          <span class="gender-label">I'm a</span>
          <div class="gender-pills" role="radiogroup" aria-label="I am a">
            <label class="pill">
              <input type="radio" name="gender" value="m" checked />
              <span>Guy</span>
            </label>
            <label class="pill">
              <input type="radio" name="gender" value="f" />
              <span>Girl</span>
            </label>
          </div>
        </div>

        <label class="interests-label">Interests <span class="muted">(optional, comma-separated)</span></label>
        <input id="interests" type="text" placeholder="music, coding, travel" maxlength="120" />

        <div class="cta-row">
          <button id="startVideo" class="btn btn-primary">Start video chat</button>
          <button id="startText" class="btn btn-ghost">Text only</button>
        </div>

        <p class="terms">By tapping Start you confirm you're 18+ and agree to be kind. Rude vibes get reported and banned.</p>
      </section>

      <!-- CHAT ROOM -->
      <section id="room" class="room hidden">
        <div class="videos">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localVideo" autoplay playsinline muted></video>
          <div id="status" class="status">Looking for someone new…</div>
        </div>

        <aside class="sidebar">
          <div id="messages" class="messages"></div>
          <div id="typing" class="typing hidden">They're typing…</div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" placeholder="Say hi…" maxlength="1000" autocomplete="off" />
            <button class="btn btn-send" type="submit">Send</button>
          </form>
          <div class="controls">
            <button id="nextBtn" class="btn btn-next">Next ▶</button>
            <button id="stopBtn" class="btn btn-ghost">Stop</button>
            <button id="reportBtn" class="btn btn-danger" title="Report user">Report</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
